# Clean NDA Approval Policy
approval_thresholds:
  LOW:
    auto_approve: true
    required_approvers: []
  MEDIUM:
    auto_approve: false
    required_approvers:
      - legal_counsel
  HIGH:
    auto_approve: false
    required_approvers:
      - legal_counsel
      - department_head
  CRITICAL:
    auto_approve: false
    required_approvers:
      - legal_counsel
      - department_head
      - cfo

escalation_rules:
  - condition: counterparty_is_new
    action: add_approver
    approver: procurement_manager
  - condition: value_exceeds_100k
    action: add_approver
    approver: cfo

approved_payment_terms:
  terms:
    - net-30
  severity_if_unapproved: HIGH

signing_authority_thresholds:
  thresholds_usd:
    department_head: 50000
    cfo: 100000

liability_cap_requirements:
  required: true
  minimum_cap: fees_paid_12_months
  severity_if_missing: HIGH

auto_renewal_rules:
  allowed: false
  minimum_notice_days: 30
  severity_if_unapproved: MEDIUM

high_risk_jurisdictions:
  - Russia
  - Iran
  - North Korea
  - Syria

gdpr_requirements:
  applies_when_personal_data: true
  required_clauses:
    - data_processing_terms
    - cross_border_transfer_controls
    - data_subject_rights
  severity_if_missing: CRITICAL

manual_review_confidence_threshold: 0.75
